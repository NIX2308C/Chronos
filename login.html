<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chronos — Sign in</title>
<script>(function(){try{var t=localStorage.getItem('teacherai_theme');if(!t)t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';if(t==='dark')document.documentElement.classList.add('dark');}catch(e){}})();</script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "primary-container": "#131b2e", "error-container": "#ffdad6",
                    "surface-container-low": "#f2f4f6", "surface-dim": "#d8dadc",
                    "surface-bright": "#f7f9fb", "background": "#f7f9fb", "on-tertiary": "#ffffff",
                    "surface-container": "#eceef0", "surface-container-highest": "#e0e3e5",
                    "on-error": "#ffffff", "on-secondary": "#ffffff", "on-primary-container": "#7c839b",
                    "tertiary-container": "#001a42", "on-error-container": "#93000a",
                    "surface-container-high": "#e6e8ea", "on-tertiary-container": "#3980f4",
                    "surface": "#f7f9fb", "on-background": "#191c1e", "surface-tint": "#565e74",
                    "outline": "#76777d", "primary": "#000000", "tertiary-fixed-dim": "#adc6ff",
                    "on-primary": "#ffffff", "on-secondary-container": "#4b6a4f", "on-surface": "#191c1e",
                    "secondary": "#47664b", "error": "#ba1a1a", "outline-variant": "#c6c6cd",
                    "secondary-container": "#c6e9c7", "surface-variant": "#e0e3e5",
                    "on-surface-variant": "#45464d", "tertiary": "#000000", "surface-container-lowest": "#ffffff"
                },
                "borderRadius": { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                "spacing": {
                    "stack-sm": "0.5rem", "gutter": "1.5rem", "margin-mobile": "1rem",
                    "margin-desktop": "2rem", "stack-lg": "2rem", "stack-md": "1rem", "container-max": "1280px"
                },
                "fontFamily": {
                    "headline-xl": ["Inter"], "headline-lg": ["Inter"], "headline-lg-mobile": ["Inter"],
                    "label-md": ["Inter"], "headline-md": ["Inter"], "body-lg": ["Inter"],
                    "label-sm": ["Inter"], "body-md": ["Inter"]
                },
                "fontSize": {
                    "headline-xl": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                    "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                    "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                    "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                    "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                    "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                    "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                }
            }
        }
    }
</script>
<style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
    .spin { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
<link href="theme.css" rel="stylesheet"/>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-margin-mobile">

<div class="w-full max-w-sm">
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-stack-lg">

<!-- Brand -->
<a class="flex items-center justify-center gap-3 mb-stack-md" href="landing.html">
<span class="w-11 h-11 rounded-xl bg-primary text-on-primary flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined fill">school</span>
</span>
<span class="font-headline-md text-headline-md font-bold text-primary">Chronos</span>
</a>

<!-- Role toggle -->
<div class="grid grid-cols-2 gap-1 p-1 bg-surface-container-low rounded-lg mb-stack-md" id="roleTabs">
<button class="py-2 rounded-lg font-label-md text-label-md transition-colors" data-role="student">Student</button>
<button class="py-2 rounded-lg font-label-md text-label-md transition-colors" data-role="teacher">Teacher</button>
</div>

<h1 class="font-headline-md text-headline-md text-primary text-center mb-1" id="title">Sign in</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-stack-md" id="subtitle">Welcome back.</p>

<label class="font-label-md text-label-md text-on-surface mb-1 block" for="email">Email</label>
<input autocomplete="email" class="w-full mb-stack-md rounded-lg border-outline-variant bg-surface-container-low text-on-background font-body-md text-body-md px-4 py-3 focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" placeholder="you@example.com" type="email"/>

<label class="font-label-md text-label-md text-on-surface mb-1 block" for="password">Password</label>
<input autocomplete="current-password" class="w-full rounded-lg border-outline-variant bg-surface-container-low text-on-background font-body-md text-body-md px-4 py-3 focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" placeholder="••••••••" type="password"/>

<!-- Teacher code (signup as teacher only) -->
<div class="hidden mt-stack-md" id="codeWrap">
<label class="font-label-md text-label-md text-on-surface mb-1 block" for="teacherCode">Teacher code</label>
<input class="w-full rounded-lg border-outline-variant bg-surface-container-low text-on-background font-body-md text-body-md px-4 py-3 focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="teacherCode" placeholder="Code from your admin" type="password"/>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Required to create a teacher account.</p>
</div>

<p class="hidden mt-stack-md text-center font-label-md text-label-md text-on-error-container bg-error-container rounded-lg px-3 py-2" id="err"></p>

<button class="w-full mt-stack-md py-3 bg-primary text-on-primary rounded-lg font-label-md text-label-md flex items-center justify-center gap-2 hover:opacity-90 transition-opacity disabled:opacity-50" id="submitBtn">Sign in</button>

<p class="text-center mt-stack-md font-body-md text-body-md text-on-surface-variant">
<span id="toggleText">Don't have an account?</span>
<button class="text-primary font-semibold hover:underline ml-1" id="toggleMode">Sign up</button>
</p>

<a class="block text-center mt-stack-md font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="landing.html">← Back to home</a>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="auth.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  let role = params.get("role") === "teacher" ? "teacher" : "student";
  let mode = "signin"; // or "signup"

  function dest() { return role === "teacher" ? "teacherknowledge.html" : "student.html"; }

  function showErr(msg) { const e = $("err"); e.textContent = msg; e.classList.toggle("hidden", !msg); }

  function paintRoleTabs() {
    document.querySelectorAll("#roleTabs button").forEach((b) => {
      const on = b.dataset.role === role;
      b.className = "py-2 rounded-lg font-label-md text-label-md transition-colors " +
        (on ? "bg-surface-container-lowest text-primary shadow-sm" : "text-on-surface-variant hover:text-primary");
    });
  }

  function paintMode() {
    const isUp = mode === "signup";
    $("title").textContent = isUp ? "Create account" : "Sign in";
    $("subtitle").textContent = isUp
      ? (role === "teacher" ? "Set up your teacher account." : "Start learning with Chronos.")
      : "Welcome back.";
    $("submitBtn").textContent = isUp ? "Create account" : "Sign in";
    $("password").autocomplete = isUp ? "new-password" : "current-password";
    $("toggleText").textContent = isUp ? "Already have an account?" : "Don't have an account?";
    $("toggleMode").textContent = isUp ? "Sign in" : "Sign up";
    // Teacher code only matters when creating a teacher account.
    $("codeWrap").classList.toggle("hidden", !(isUp && role === "teacher"));
    showErr("");
  }

  document.querySelectorAll("#roleTabs button").forEach((b) => {
    b.onclick = () => { role = b.dataset.role; paintRoleTabs(); paintMode(); };
  });
  $("toggleMode").onclick = () => { mode = mode === "signin" ? "signup" : "signin"; paintMode(); };

  async function submit() {
    const email = $("email").value.trim();
    const password = $("password").value;
    if (!email || !password) { showErr("Enter your email and password."); return; }
    showErr("");
    const btn = $("submitBtn");
    btn.disabled = true;
    const label = btn.textContent;
    btn.innerHTML = '<span class="material-symbols-outlined text-[18px] spin">progress_activity</span>';
    try {
      let info;
      if (mode === "signup") {
        info = await Chronos.signup(email, password, role, $("teacherCode").value.trim());
      } else {
        info = await Chronos.login(email, password);
      }
      // Honor the account's actual role for the redirect (a teacher signing in on
      // the student tab still lands on the teacher panel, and vice-versa).
      location.replace(info.role === "teacher" ? "teacherknowledge.html" : "student.html");
    } catch (e) {
      showErr(e.message || "Something went wrong.");
      btn.disabled = false;
      btn.textContent = label;
    }
  }

  $("submitBtn").onclick = submit;
  ["email", "password", "teacherCode"].forEach((id) =>
    $(id).addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); }));

  if (params.get("denied")) showErr("Please sign in with the right account for that area.");

  paintRoleTabs();
  paintMode();

  // Already signed in? Skip the form and go where they belong.
  Chronos.ready.then(() => {
    Chronos.onUser(async (user) => {
      if (!user) return;
      try { const info = await Chronos.me();
        if (info) location.replace(info.role === "teacher" ? "teacherknowledge.html" : "student.html");
      } catch (e) {}
    });
  }).catch((e) => showErr(e.message));
</script>
<script src="theme.js"></script>
</body></html>
