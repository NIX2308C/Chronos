<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor — Stats</title>
<script>
  (function(){try{var t=localStorage.getItem('teacherai_theme');if(!t)t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f8fa;--panel:#ffffff;--panel-2:#f9fafb;
    --border:#e5e7eb;--border-2:#d8dce2;
    --text:#101828;--muted:#667085;--faint:#98a2b3;
    --accent:#4f46e5;--accent-hover:#4338ca;--accent-weak:#eef2ff;--accent-text:#4338ca;
    --ring:rgba(79,70,229,.16);
    --danger:#b42318;--danger-bg:#fef3f2;--danger-border:#fecdca;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.05);
    --scroll:#dfe3e8;--scroll-hover:#cbd2dc;
  }
  [data-theme="dark"]{
    --bg:#0e1014;--panel:#16181d;--panel-2:#1b1e24;
    --border:#262a31;--border-2:#323742;
    --text:#e7e9ee;--muted:#9aa3b2;--faint:#6b7280;
    --accent:#6366f1;--accent-hover:#818cf8;--accent-weak:#1e1b33;--accent-text:#a5b4fc;
    --ring:rgba(99,102,241,.3);
    --danger:#fca5a5;--danger-bg:#2a1714;--danger-border:#5b201a;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.35);
    --scroll:#2b2f37;--scroll-hover:#3a3f49;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  ::selection{background:var(--accent-weak);}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background-color .3s ease,color .3s ease;}
  .card,.stat-card,.topbar,.bar-track,.tag,input,.theme-toggle{transition:background-color .3s ease,border-color .3s ease,color .3s ease;}

  .topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .topbar h1{font-size:15px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:10px;}
  .topbar h1 .logo{width:28px;height:28px;border-radius:7px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;}
  .topbar h1 .logo svg{width:15px;height:15px;}
  .topnav{display:flex;align-items:center;gap:6px;}
  .topnav a{font-size:13px;color:var(--muted);text-decoration:none;padding:6px 10px;border-radius:7px;transition:color .12s,background .12s;font-weight:500;}
  .topnav a:hover{color:var(--text);background:var(--panel-2);}
  .wrap{max-width:1000px;margin:0 auto;padding:28px 24px 60px;}

  .toast{padding:11px 14px;border-radius:9px;font-size:13px;margin-bottom:16px;display:none;border:1px solid transparent;}
  .toast.err{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border);display:block;animation:slideDown .25s ease;}

  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
  .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--shadow);animation:fadeUp .45s ease backwards;}
  .stat-card .num{font-size:30px;font-weight:700;letter-spacing:-.03em;color:var(--text);}
  .stat-card .lbl{font-size:13px;color:var(--muted);margin-top:5px;}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px;box-shadow:var(--shadow);animation:fadeUp .45s ease backwards;}
  .card h2{font-size:15px;font-weight:600;margin-bottom:18px;letter-spacing:-.01em;display:flex;justify-content:space-between;align-items:center;}
  .bar-row{display:flex;align-items:center;gap:14px;margin-bottom:11px;animation:fadeUp .3s ease backwards;}
  .bar-label{width:150px;font-size:13px;flex-shrink:0;text-align:right;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{flex:1;background:var(--panel-2);border:1px solid var(--border);border-radius:6px;height:22px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--accent);border-radius:5px;width:0;transition:width .7s cubic-bezier(.4,0,.2,1);}
  .bar-count{width:34px;font-size:13px;font-weight:600;color:var(--muted);}

  .feed-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:14px;align-items:flex-start;animation:fadeUp .3s ease backwards;}
  .feed-item:last-child{border-bottom:none;}
  .feed-q{font-size:13.5px;line-height:1.5;}
  .tag{font-size:11px;font-weight:600;color:var(--accent-text);background:var(--accent-weak);padding:3px 10px;border-radius:6px;white-space:nowrap;flex-shrink:0;}

  .btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:550;cursor:pointer;font-family:inherit;transition:background .12s,opacity .12s,transform .12s;}
  .btn:hover:not(:disabled){background:var(--accent-hover);}
  .btn:active:not(:disabled){transform:scale(.97);}
  .btn:disabled{opacity:.45;cursor:default;}

  .theme-toggle{width:34px;height:34px;border-radius:8px;border:1px solid var(--border-2);background:var(--panel);color:var(--muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:0;margin-left:6px;transition:background .12s,color .12s,border-color .12s,transform .12s;}
  .theme-toggle:hover{background:var(--panel-2);color:var(--text);}
  .theme-toggle:active{transform:scale(.94);}
  .theme-toggle svg{width:16px;height:16px;}
  .theme-toggle .sun{display:none;}
  [data-theme="dark"] .theme-toggle .sun{display:block;}
  [data-theme="dark"] .theme-toggle .moon{display:none;}

  .gate{max-width:400px;margin:96px auto;animation:fadeUp .4s ease;}
  .gate .card{padding:30px 28px;text-align:center;}
  .gate .lock{width:48px;height:48px;border-radius:12px;background:var(--accent-weak);color:var(--accent-text);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
  .gate .lock svg{width:24px;height:24px;}
  .gate h2{font-size:15px;font-weight:600;margin-bottom:16px;}
  input[type=password]{width:100%;border:1px solid var(--border-2);border-radius:9px;padding:11px 13px;font-size:14px;outline:none;background:var(--panel);color:var(--text);font-family:inherit;transition:border-color .15s,box-shadow .15s;}
  input::placeholder{color:var(--faint);}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--ring);}
  .gate-toast{padding:10px;border-radius:8px;font-size:13px;margin-top:12px;display:none;}
  .gate-toast.err{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border);display:block;animation:slideDown .25s ease;}

  .hidden{display:none;}
  .muted{color:var(--muted);font-size:13px;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:7px;}

  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes slideDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}.bar-fill{transition:none!important;}}

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:8px;border:2px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:var(--scroll-hover);background-clip:padding-box;}
</style>
</head>
<body>
  <div class="topbar">
    <h1><span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/></svg></span>Analytics</h1>
    <div class="topnav">
      <a href="teacherknowledge.html">Knowledge</a>
      <a href="student.html">Student view</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </div>
  </div>

  <div class="gate" id="gate">
    <div class="card">
      <div class="lock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <h2>Teacher Access</h2>
      <input type="password" id="pwInput" placeholder="Enter teacher password">
      <div class="gate-toast" id="gateToast"></div>
      <button class="btn" id="pwBtn" style="margin-top:14px;width:100%;justify-content:center;">Unlock</button>
    </div>
  </div>

  <div class="wrap hidden" id="panel">
    <div class="toast" id="toast"></div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <p class="muted">Analytics from student chat logs. Questions are auto-categorized by AI.</p>
      <button class="btn" id="refreshBtn">Refresh</button>
    </div>

    <div class="stat-grid">
      <div class="stat-card" style="animation-delay:.02s"><div class="num" id="qTotal">—</div><div class="lbl">Total questions</div></div>
      <div class="stat-card" style="animation-delay:.07s"><div class="num" id="sTotal">—</div><div class="lbl">Chat sessions</div></div>
      <div class="stat-card" style="animation-delay:.12s"><div class="num" id="cTotal">—</div><div class="lbl">Distinct topics</div></div>
    </div>

    <div class="card" style="animation-delay:.16s">
      <h2>Questions by topic</h2>
      <div id="bars"><p class="muted">Loading…</p></div>
    </div>

    <div class="card" style="animation-delay:.2s">
      <h2>Recent questions</h2>
      <div id="feed"><p class="muted">Loading…</p></div>
    </div>
  </div>

<script>
  // Same-origin when served by Flask (deployed); dev server when via Live Server / file://.
  const BASE=(location.port==="5500"||location.protocol==="file:")?"http://127.0.0.1:5000":"";
  let PW="";
  const $=id=>document.getElementById(id);
  const reduceMotion=matchMedia("(prefers-reduced-motion: reduce)").matches;

  async function api(path,body){
    let res;
    try{res=await fetch(BASE+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...body,password:PW})});}
    catch{throw new Error("Cannot reach server — is app.py running on port 5000?");}
    const data=await res.json();
    if(res.status===401)throw new Error("Wrong password");
    if(!res.ok||data.error)throw new Error(data.details||data.error||"Request failed");
    return data;
  }

  function animateCount(el,target){
    target=Number(target)||0;
    if(reduceMotion){el.textContent=target;return;}
    const dur=600,t0=performance.now();
    function step(now){const p=Math.min((now-t0)/dur,1);const e=1-Math.pow(1-p,3);el.textContent=Math.round(e*target);if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
  }

  async function unlock(){
    PW=$("pwInput").value;
    try{
      $("pwBtn").innerHTML='<span class="spinner"></span>Loading…';
      await load();
      $("gate").classList.add("hidden");
      $("panel").classList.remove("hidden");
    }catch(e){
      $("gateToast").textContent=e.message;$("gateToast").className="gate-toast err";
      $("pwBtn").textContent="Unlock";
    }
  }

  async function load(){
    $("refreshBtn").disabled=true;
    try{
      const d=await api("/stats",{limit:200});
      animateCount($("qTotal"),d.total_questions);
      animateCount($("sTotal"),d.total_sessions);
      animateCount($("cTotal"),d.categories.length);

      // bars
      const bars=$("bars");bars.innerHTML="";
      if(!d.categories.length){bars.innerHTML='<p class="muted">No questions logged yet.</p>';}
      else{
        const max=Math.max(...d.categories.map(c=>c.count));
        d.categories.forEach((c,i)=>{
          const row=document.createElement("div");row.className="bar-row";row.style.animationDelay=(i*0.04)+"s";
          row.innerHTML=`<div class="bar-label">${esc(c.name)}</div><div class="bar-track"><div class="bar-fill" data-w="${(c.count/max*100).toFixed(0)}"></div></div><div class="bar-count">${c.count}</div>`;
          bars.appendChild(row);
        });
        requestAnimationFrame(()=>bars.querySelectorAll(".bar-fill").forEach(f=>{f.style.width=f.dataset.w+"%";}));
      }

      // feed
      const feed=$("feed");feed.innerHTML="";
      if(!d.recent.length){feed.innerHTML='<p class="muted">No recent questions.</p>';}
      else{
        d.recent.forEach((r,i)=>{
          const item=document.createElement("div");item.className="feed-item";item.style.animationDelay=(i*0.025)+"s";
          item.innerHTML=`<div class="feed-q">${esc(r.question)}</div><div class="tag">${esc(r.category)}</div>`;
          feed.appendChild(item);
        });
      }
    }finally{$("refreshBtn").disabled=false;}
  }

  function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}

  // theme
  function toggleTheme(){const cur=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",cur);try{localStorage.setItem("teacherai_theme",cur);}catch(e){}}
  $("themeToggle").onclick=toggleTheme;
  addEventListener("storage",e=>{if(e.key==="teacherai_theme"&&e.newValue)document.documentElement.setAttribute("data-theme",e.newValue);});

  $("pwBtn").onclick=unlock;
  $("pwInput").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
  $("refreshBtn").onclick=()=>{load().catch(e=>{$("toast").textContent=e.message;$("toast").className="toast err";});};
</script>
</body>
</html>
