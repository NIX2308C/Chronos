<style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }

    /* typing cursor */
    .cursor { display:inline-block; width:6px; height:1rem; background:#76777d; border-radius:1px; margin-left:2px; vertical-align:text-bottom; animation:blink 1s steps(2) infinite; }

    /* markdown inside AI bubbles */

    .ai-prose p:last-child, .ai-prose ul:last-child, .ai-prose ol:last-child, .ai-prose pre:last-child { margin-bottom:0; }
    .ai-prose ul { list-style:disc; padding-left:1.25rem; margin:0 0 .75rem; }
    .ai-prose ol { list-style:decimal; padding-left:1.25rem; margin:0 0 .75rem; }

    .ai-prose em { font-style:italic; }

    .ai-prose blockquote { border-left:3px solid #c6c6cd; padding-left:.75rem; margin:.5rem 0; color:#45464d; }

<script>
  // Same-origin when served by Flask (deployed); point at the dev server when
  // the page is opened via Live Server (port 5500) or directly from disk.
  const API_BASE=(location.port==="5500"||location.protocol==="file:")?"http://127.0.0.1:5000":"";
  const API_URL=API_BASE+"/chat";

  // --- tiny self-contained markdown renderer (bold, italics, lists, code, headings, links) ---
  function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function mdInline(s){
    s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    s=s.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
    s=s.replace(/__(.+?)__/g,"<strong>$1</strong>");
    s=s.replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<em>$2</em>");
    s=s.replace(/(^|[^_\w])_([^_\n]+)_/g,"$1<em>$2</em>");
    return s;
  }
  function renderMarkdown(src){
    const NUL=String.fromCharCode(0),blocks=[],inls=[];
    let text=String(src).replace(/\r\n/g,"\n");
    text=text.replace(/```(\w*)\n?([\s\S]*?)```/g,(m,lang,code)=>{blocks.push(escapeHtml(code.replace(/\n+$/,"")));return NUL+"CB"+(blocks.length-1)+NUL;});
    text=escapeHtml(text);
    text=text.replace(/`([^`\n]+)`/g,(m,code)=>{inls.push(code);return NUL+"IC"+(inls.length-1)+NUL;});
    const lines=text.split("\n");let html="",i=0;
    const isUL=l=>/^\s*[\-\*\+]\s+/.test(l),isOL=l=>/^\s*\d+\.\s+/.test(l),isH=l=>/^#{1,6}\s+/.test(l),isQ=l=>/^>\s?/.test(l),isCB=l=>new RegExp("^"+NUL+"CB\\d+"+NUL+"$").test(l);
    while(i<lines.length){
      let line=lines[i];
      if(/^\s*$/.test(line)){i++;continue;}
      if(isCB(line)){const n=line.match(/CB(\d+)/)[1];html+="<pre><code>"+blocks[+n]+"</code></pre>";i++;continue;}
      let h=line.match(/^(#{1,6})\s+(.*)$/);
      if(h){const lv=Math.min(h[1].length,3);html+="<h"+lv+">"+mdInline(h[2])+"</h"+lv+">";i++;continue;}
      if(isQ(line)){let buf=[];while(i<lines.length&&isQ(lines[i])){buf.push(lines[i].replace(/^>\s?/,""));i++;}html+="<blockquote>"+mdInline(buf.join("<br>"))+"</blockquote>";continue;}
      if(isUL(line)){let buf="";while(i<lines.length&&isUL(lines[i])){buf+="<li>"+mdInline(lines[i].replace(/^\s*[\-\*\+]\s+/,""))+"</li>";i++;}html+="<ul>"+buf+"</ul>";continue;}
      if(isOL(line)){let buf="";while(i<lines.length&&isOL(lines[i])){buf+="<li>"+mdInline(lines[i].replace(/^\s*\d+\.\s+/,""))+"</li>";i++;}html+="<ol>"+buf+"</ol>";continue;}
      let buf=[];
      while(i<lines.length&&!/^\s*$/.test(lines[i])&&!isH(lines[i])&&!isQ(lines[i])&&!isUL(lines[i])&&!isOL(lines[i])&&!isCB(lines[i])){buf.push(lines[i]);i++;}
      html+="<p>"+mdInline(buf.join("<br>"))+"</p>";
    }
    html=html.replace(new RegExp(NUL+"IC(\\d+)"+NUL,"g"),(m,n)=>"<code>"+inls[+n]+"</code>");
    html=html.replace(new RegExp(NUL+"CB(\\d+)"+NUL,"g"),(m,n)=>"<pre><code>"+blocks[+n]+"</code></pre>");
    return html;
  }

  let chats=[],activeChatId=null;
  const els={chatList:document.getElementById("chatList"),messagesInner:document.getElementById("messagesInner"),input:document.getElementById("input"),sendBtn:document.getElementById("sendBtn"),newChatBtn:document.getElementById("newChatBtn"),newChatBtnMobile:document.getElementById("newChatBtnMobile"),statusDot:document.getElementById("statusDot"),statusText:document.getElementById("statusText"),messages:document.getElementById("messages"),contextBody:document.getElementById("contextBody")};

  function uid(){return"s_"+Math.random().toString(36).slice(2,10);}
  function newChat(){const c={id:uid(),title:"New chat",sessionId:uid(),messages:[]};chats.unshift(c);activeChatId=c.id;renderSidebar();renderMessages();els.input.focus();}
  function activeChat(){return chats.find(c=>c.id===activeChatId);}

  function renderSidebar(){
    els.chatList.innerHTML="";
    chats.forEach(c=>{
      const it=document.createElement("button");
      const on=c.id===activeChatId;
      it.className="w-full text-left px-3 py-2.5 rounded-xl font-label-md text-label-md truncate transition-colors "+(on?"bg-secondary-container text-on-secondary-container":"text-on-surface-variant hover:bg-surface-container-high");
      it.textContent=c.title;
      it.onclick=()=>{activeChatId=c.id;renderSidebar();renderMessages();};
      els.chatList.appendChild(it);
    });
  }

  function renderMessages(){
    const c=activeChat();
    els.messagesInner.innerHTML="";
    if(!c||c.messages.length===0){
      const e=document.createElement("div");
      e.className="flex flex-col items-center text-center mt-24 px-6";
      e.innerHTML='<div class="w-14 h-14 rounded-2xl bg-secondary-container text-on-secondary-container flex items-center justify-center mb-4"><span class="material-symbols-outlined text-[28px] fill">robot_2</span></div>'+
        '<h2 class="font-headline-md text-headline-md text-primary mb-2">Ask your Tutor</h2>'+
        '<p class="font-body-md text-body-md text-on-surface-variant max-w-sm">Answers are grounded only in your teacher’s rules and uploaded materials.</p>';
      els.messagesInner.appendChild(e);
      updateContext(null);
      return;
    }
    c.messages.forEach(m=>els.messagesInner.appendChild(buildMsgEl(m)));
    // reflect the most recent AI response's sources in the context sidebar
    const lastAI=[...c.messages].reverse().find(m=>m.role==="teacher"&&m.rules&&m.rules.length);
    updateContext(lastAI?lastAI.rules:null);
    scrollBottom();
  }

  function buildMsgEl(m){
    if(m.role==="student"){
      const w=document.createElement("div");w.className="flex flex-col items-end mb-stack-lg";
      const b=document.createElement("div");
      b.className="max-w-[85%] bg-primary text-on-primary rounded-2xl rounded-tr-sm px-5 py-4 font-body-md text-body-md shadow-sm whitespace-pre-wrap break-words";
      b.textContent=m.content;
      w.appendChild(b);return w;
    }
    const w=document.createElement("div");w.className="flex flex-col items-start mb-stack-lg";
    const label=document.createElement("div");label.className="flex items-center gap-2 mb-2 ml-1";
    label.innerHTML='<span class="material-symbols-outlined text-secondary text-sm fill">robot_2</span>'+
      '<span class="font-label-sm text-label-sm text-secondary">TeacherAI</span>'+
      '<span class="flex items-center gap-1 bg-secondary-container text-on-secondary-container px-2 py-0.5 rounded-full"><span class="material-symbols-outlined text-[12px]">verified</span><span class="font-label-sm text-[10px]">Grounded in Knowledge Base</span></span>';
    const b=document.createElement("div");
    b.className="ai-prose max-w-[85%] bg-surface-container-low border border-outline-variant rounded-2xl rounded-tl-sm px-5 py-4 font-body-md text-body-md text-on-surface break-words";
    if(m.content){b.innerHTML=renderMarkdown(m.content);}
    w.appendChild(label);w.appendChild(b);
    if(m.rules&&m.rules.length){w.appendChild(buildRulesInline(m.rules));}
    return w;
  }

  // Compact inline sources (shown on smaller screens where the context sidebar is hidden)
  function buildRulesInline(rules){
    const r=document.createElement("div");
    r.className="xl:hidden mt-2 ml-1 max-w-[85%] bg-surface-container-low border border-outline-variant rounded-lg p-3";
    const l=document.createElement("div");l.className="font-label-sm text-[10px] text-on-surface-variant uppercase tracking-wider mb-1.5 flex items-center gap-1";
    l.innerHTML='<span class="material-symbols-outlined text-[13px]">menu_book</span> Sources used';
    r.appendChild(l);
    rules.forEach(x=>{const ln=document.createElement("p");ln.className="font-label-sm text-label-sm text-on-surface-variant leading-snug mb-1 last:mb-0";ln.textContent=x;r.appendChild(ln);});
    return r;
  }

  // Right "Active Context" sidebar — shows the teacher rules behind the latest answer
  function updateContext(rules){
    const box=els.contextBody;box.innerHTML="";
    if(!rules||!rules.length){
      box.innerHTML='<p class="font-label-sm text-label-sm text-on-surface-variant">The teacher sources used to answer will appear here once you ask a question.</p>';
      return;
    }
    const intro=document.createElement("p");intro.className="font-label-sm text-label-sm text-on-surface-variant mb-1";
    intro.textContent="The AI used these teacher sources for its latest answer:";
    box.appendChild(intro);
    rules.forEach((x,i)=>{
      const card=document.createElement("div");
      card.className="bg-surface-container-low border border-outline-variant rounded-lg p-3";
      card.innerHTML='<div class="flex items-start gap-3">'+
        '<div class="bg-secondary-container text-on-secondary-container p-1.5 rounded flex items-center justify-center mt-0.5"><span class="material-symbols-outlined text-sm">description</span></div>'+
        '<div class="min-w-0"><h3 class="font-label-md text-label-md text-on-surface">Source '+(i+1)+'</h3>'+
        '<p class="font-label-sm text-[11px] text-on-surface-variant mt-1"></p></div></div>';
      card.querySelector("p").textContent=x;
      box.appendChild(card);
    });
  }

  function scrollBottom(){els.messages.scrollTop=els.messages.scrollHeight;}

  function typeOut(b,text,done){
    let i=0;const cur=document.createElement("span");cur.className="cursor";b.appendChild(cur);
    const speed=Math.max(8,Math.min(28,1200/Math.max(text.length,1)));
    const t=setInterval(()=>{cur.remove();b.textContent=text.slice(0,i);b.appendChild(cur);scrollBottom();i++;if(i>text.length){clearInterval(t);cur.remove();b.innerHTML=renderMarkdown(text);if(done)done();}},speed);
  }

  async function send(){
    const text=els.input.value.trim();if(!text)return;
    if(!activeChat())newChat();
    const c=activeChat();
    c.messages.push({role:"student",content:text});
    if(c.messages.length===1){c.title=text.length>30?text.slice(0,30)+"…":text;renderSidebar();}
    els.input.value="";els.input.style.height="auto";
    renderMessages();
    setSending(true);
    const tm={role:"teacher",content:"",rules:[]};c.messages.push(tm);
    const el=buildMsgEl(tm);els.messagesInner.appendChild(el);
    const b=el.querySelector(".ai-prose");b.innerHTML='<span class="cursor"></span>';scrollBottom();
    try{
      const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text,session_id:c.sessionId})});
      setStatus("online");
      const data=await res.json();
      if(!res.ok||data.error){b.textContent=(data.details||data.error||"Something went wrong. Please try again.");tm.content=b.textContent;setSending(false);return;}
      tm.content=data.response||"";tm.rules=data.rules_used||[];
      b.textContent="";
      typeOut(b,tm.content,()=>{
        if(tm.rules.length){el.appendChild(buildRulesInline(tm.rules));}
        updateContext(tm.rules);
        scrollBottom();setSending(false);
      });
    }catch(err){
      setStatus("offline");
      b.textContent="Can't reach the server. Is app.py running on port 5000?";tm.content=b.textContent;setSending(false);
    }
  }

  function setSending(on){els.sendBtn.disabled=on;els.input.disabled=on;if(!on)els.input.focus();}

  function setStatus(state){
    if(state==="online"){els.statusDot.className="w-2 h-2 rounded-full bg-secondary";els.statusText.textContent="Online";}
    else if(state==="waking"){els.statusDot.className="w-2 h-2 rounded-full bg-[#c79a3c] animate-pulse";els.statusText.textContent="Waking server…";}
    else{els.statusDot.className="w-2 h-2 rounded-full bg-error";els.statusText.textContent="Offline";}
  }

  async function checkServer(){
    // Free hosting (e.g. Render) sleeps after inactivity and can take ~50s to wake,
    // erroring meanwhile. Retry a few times and show "Waking…" so a sleeping-but-
    // reachable server isn't misreported as a hard "Offline".
    for(let i=0;i<3;i++){
      try{const r=await fetch(API_BASE+"/health",{cache:"no-store"});if(r.ok){setStatus("online");return;}}catch{}
      setStatus("waking");
      await new Promise(res=>setTimeout(res,2500));
    }
    setStatus("offline");
  }

  // wiring
  els.sendBtn.onclick=send;
  els.newChatBtn.onclick=newChat;
  els.newChatBtnMobile.onclick=newChat;
  els.input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
  els.input.addEventListener("input",()=>{els.input.style.height="auto";els.input.style.height=Math.min(els.input.scrollHeight,160)+"px";});
  newChat();checkServer();setInterval(checkServer,15000);
</script>
<script src="theme.js"></script>
